<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Review Dashboard</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922; --red: #f85149; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 1rem; }
  .container { max-width: 1400px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  header h1 { font-size: 1.5rem; }
  header .meta { color: var(--text-dim); font-size: 0.85rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
  .card .label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card .value { font-size: 1.8rem; font-weight: 600; margin-top: 0.25rem; }
  .card.green .value { color: var(--green); }
  .card.yellow .value { color: var(--yellow); }
  .card.red .value { color: var(--red); }
  .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { background: var(--surface); border: 1px solid var(--border); border-radius: 6px 6px 0 0; padding: 0.5rem 1rem; cursor: pointer; color: var(--text-dim); font-size: 0.9rem; }
  .tab.active { background: var(--border); color: var(--text); border-bottom-color: var(--border); }
  .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-bar input, .search-bar select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; color: var(--text); font-size: 0.9rem; }
  .search-bar input { flex: 1; min-width: 200px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
  th { background: var(--surface); color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; user-select: none; }
  th:hover { color: var(--accent); }
  th, td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
  tr:hover { background: rgba(88,166,255,0.04); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
  .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .policy-cell { position: relative; }
  .policy-popup-wrap { cursor: pointer; }
  .policy-popup { display: none; position: absolute; z-index: 100; top: 100%; left: 0; min-width: 320px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); padding: 0.75rem; font-size: 0.82rem; }
  .policy-popup.visible { display: block; }
  .policy-popup h4 { margin: 0 0 0.5rem 0; font-size: 0.85rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
  .policy-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .policy-row:last-child { border-bottom: none; }
  .policy-icon { flex-shrink: 0; width: 1.2em; text-align: center; }
  .policy-name { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .policy-blocking { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 4px; background: rgba(248,81,73,0.15); color: var(--red); white-space: nowrap; }
  .policy-optional { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 4px; background: rgba(139,148,158,0.15); color: var(--text-dim); white-space: nowrap; }
  .reviewer-cell { position: relative; }
  .reviewer-popup-wrap { cursor: pointer; }
  .reviewer-popup { display: none; position: absolute; z-index: 100; top: 100%; left: 0; min-width: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); padding: 0.75rem; font-size: 0.82rem; }
  .reviewer-popup.visible { display: block; }
  .reviewer-popup h4 { margin: 0 0 0.5rem 0; font-size: 0.85rem; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 0.4rem; }
  .reviewer-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
  .reviewer-row:last-child { border-bottom: none; }
  .reviewer-icon { flex-shrink: 0; width: 1.2em; text-align: center; }
  .reviewer-name { flex: 1; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media print { .reviewer-popup { display: none !important; } }
  @media print { .policy-popup { display: none !important; } }
  .section { margin-bottom: 2rem; }
  .section h2 { font-size: 1.1rem; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .export-bar { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.75rem; color: var(--text); cursor: pointer; font-size: 0.85rem; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .empty { color: var(--text-dim); text-align: center; padding: 2rem; }
  @media print { body { background: #fff; color: #000; } .card { border: 1px solid #ccc; } th { background: #f5f5f5; } .search-bar, .tabs, .export-bar { display: none; } }
  @media (max-width: 768px) { .cards { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📋 PR Review Dashboard</h1>
    <div class="meta">Generated: <span id="timestamp"></span> · <span id="repo-count"></span> repos</div>
  </header>

  <div class="cards" id="summary-cards"></div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search PRs by title, author, ID..." oninput="filterTable()">
    <select id="status-filter" onchange="filterTable()">
      <option value="all">All Status</option>
      <option value="needingReview">Needing Review</option>
      <option value="waitingOnAuthor">Waiting on Author</option>
      <option value="approved">Approved</option>
    </select>
    <select id="repo-filter" onchange="filterTable()"></select>
    <select id="reviewer-filter" onchange="filterTable()"></select>
    <label style="display:flex;align-items:center;gap:0.35rem;font-size:0.9rem;color:var(--text-dim);cursor:pointer;white-space:nowrap;">
      <input type="checkbox" id="hide-conflicts" onchange="filterTable()"> Hide conflicts
    </label>
  </div>

  <div class="tabs" id="repo-tabs"></div>

  <div class="section">
    <h2>Pull Requests</h2>
    <table>
      <thead>
        <tr>
          <th onclick="sortTable(0)">ID ↕</th>
          <th onclick="sortTable(1)">Title ↕</th>
          <th onclick="sortTable(2)">Author ↕</th>
          <th onclick="sortTable(3)">Status ↕</th>
          <th onclick="sortTable(4)">Repo ↕</th>
          <th onclick="sortTable(5)">Size ↕</th>
          <th onclick="sortTable(6)">Reviewers ↕</th>
          <th onclick="sortTable(7)">Policies ↕</th>
          <th onclick="sortTable(8)">Staleness ↕</th>
        </tr>
      </thead>
      <tbody id="pr-table"></tbody>
    </table>
    <div id="empty-message" class="empty" style="display:none">No PRs match your filters.</div>
  </div>

  <div class="section" id="metrics-section" style="display:none">
    <h2>📊 Aggregate Metrics</h2>
    <div class="cards" id="metrics-cards"></div>
  </div>

  <div class="export-bar">
    <button class="btn" onclick="exportCsv()">📥 Export CSV</button>
    <button class="btn" onclick="window.print()">🖨️ Print</button>
  </div>
</div>

<script>
const DATA = {{DATA_PLACEHOLDER}};

function init() {
  document.getElementById('timestamp').textContent = new Date(DATA.generatedAt).toLocaleString();
  document.getElementById('repo-count').textContent = DATA.repositories.length;

  renderSummaryCards();
  renderRepoFilter();
  renderPrTable();
  renderMetrics();
}

function renderSummaryCards() {
  const agg = DATA.aggregate;
  const total = agg.totalPrs;
  let needingReview = 0, approved = 0, waitingOnAuthor = 0;
  for (const repo of DATA.repositories) {
    needingReview += repo.analysis.needingReview.length;
    approved += repo.analysis.approved.length;
    waitingOnAuthor += repo.analysis.waitingOnAuthor.length;
  }

  const cards = [
    { label: 'Total PRs', value: total, cls: '' },
    { label: 'Needing Review', value: needingReview, cls: 'yellow' },
    { label: 'Approved', value: approved, cls: 'green' },
    { label: 'Waiting on Author', value: waitingOnAuthor, cls: 'red' },
  ];

  let conflicts = 0;
  for (const repo of DATA.repositories) {
    for (const list of [repo.analysis.needingReview, repo.analysis.approved, repo.analysis.waitingOnAuthor]) {
      for (const pr of list) { if (pr.hasMergeConflict) conflicts++; }
    }
  }
  if (conflicts > 0) {
    cards.push({ label: 'Conflicts', value: conflicts, cls: 'red' });
  }

  if (agg.metrics) {
    cards.push({ label: 'Median Age', value: agg.metrics.medianAgeInDays.toFixed(1) + 'd', cls: '' });
  }

  const el = document.getElementById('summary-cards');
  el.innerHTML = cards.map(c => `<div class="card ${c.cls}"><div class="label">${c.label}</div><div class="value">${c.value}</div></div>`).join('');
}

function renderRepoFilter() {
  const sel = document.getElementById('repo-filter');
  sel.innerHTML = '<option value="all">All Repos</option>';
  for (const repo of DATA.repositories) {
    sel.innerHTML += `<option value="${repo.repoLabel}">${repo.repoLabel}</option>`;
  }

  // Populate required reviewer filter
  const revSel = document.getElementById('reviewer-filter');
  const requiredReviewers = new Set();
  for (const repo of DATA.repositories) {
    for (const list of [repo.analysis.needingReview, repo.analysis.approved, repo.analysis.waitingOnAuthor]) {
      for (const pr of list) {
        for (const r of (pr.reviewers || [])) {
          if (r.isRequired) requiredReviewers.add(r.displayName);
        }
      }
    }
  }
  revSel.innerHTML = '<option value="all">All Reviewers</option>';
  for (const name of [...requiredReviewers].sort()) {
    revSel.innerHTML += `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`;
  }
}

function getAllPrs() {
  const rows = [];
  for (const repo of DATA.repositories) {
    for (const pr of repo.analysis.needingReview) rows.push({ ...pr, status: 'needingReview', repo: repo.repoLabel, date: pr.waitingSince });
    for (const pr of repo.analysis.approved) rows.push({ ...pr, status: 'approved', repo: repo.repoLabel, date: pr.createdDate });
    for (const pr of repo.analysis.waitingOnAuthor) rows.push({ ...pr, status: 'waitingOnAuthor', repo: repo.repoLabel, date: pr.lastReviewerActivityDate });
  }
  return rows;
}

let allPrs = [];
let sortCol = 0, sortDir = 1;

function renderPrTable() {
  allPrs = getAllPrs();
  filterTable();
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('status-filter').value;
  const rf = document.getElementById('repo-filter').value;
  const rvf = document.getElementById('reviewer-filter').value;
  const hc = document.getElementById('hide-conflicts').checked;

  let filtered = allPrs.filter(pr => {
    if (q && !`${pr.id} ${pr.title} ${pr.author}`.toLowerCase().includes(q)) return false;
    if (sf !== 'all' && pr.status !== sf) return false;
    if (rf !== 'all' && pr.repo !== rf) return false;
    if (hc && pr.hasMergeConflict) return false;
    if (rvf !== 'all') {
      const hasRequiredReviewer = (pr.reviewers || []).some(r => r.isRequired && r.displayName === rvf);
      if (!hasRequiredReviewer) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    const va = getCellValue(a, sortCol);
    const vb = getCellValue(b, sortCol);
    return (va < vb ? -1 : va > vb ? 1 : 0) * sortDir;
  });

  const tbody = document.getElementById('pr-table');
  const empty = document.getElementById('empty-message');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(pr => {
    const statusBadge = pr.status === 'needingReview' ? '<span class="badge badge-yellow">Needs Review</span>'
      : pr.status === 'approved' ? '<span class="badge badge-green">Approved</span>'
      : '<span class="badge badge-red">Waiting</span>';
    const size = pr.size ? pr.size.label : '—';
    const staleness = getStaleness(pr);
    const policyCell = getPolicyCell(pr.policyStatus, pr.pipelineStatus);
    const reviewerCell = getReviewerCell(pr.reviewers);
    const conflict = pr.hasMergeConflict ? ' <span class="badge badge-red">❌ conflict</span>' : '';
    return `<tr>
      <td><a href="${pr.url}" target="_blank">#${pr.id}</a></td>
      <td>${escapeHtml(pr.title)}${conflict}</td>
      <td>${pr.isStarred ? '⭐ ' : ''}${escapeHtml(pr.author)}</td>
      <td>${statusBadge}</td>
      <td>${escapeHtml(pr.repo)}</td>
      <td>${size}</td>
      <td class="reviewer-cell">${reviewerCell}</td>
      <td class="policy-cell">${policyCell}</td>
      <td>${staleness}</td>
    </tr>`;
  }).join('');
}

function getCellValue(pr, col) {
  switch(col) {
    case 0: return pr.id;
    case 1: return pr.title.toLowerCase();
    case 2: return pr.author.toLowerCase();
    case 3: return pr.status;
    case 4: return pr.repo;
    case 5: return pr.size ? pr.size.totalChanges : 0;
    case 6: {
      const reviewers = pr.reviewers || [];
      return reviewers.filter(r => r.isRequired).length * 1000 + reviewers.length;
    }
    case 7: {
      const ps = pr.policyStatus;
      if (ps) return ps.rejected > 0 ? 2 : ps.running > 0 ? 1 : 0;
      const pp = pr.pipelineStatus;
      if (pp) return pp.failed > 0 ? 2 : pp.inProgress > 0 ? 1 : 0;
      return -1;
    }
    case 8: return pr.date ? new Date(pr.date).getTime() : 0;
    default: return '';
  }
}

function sortTable(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  filterTable();
}

function getStaleness(pr) {
  if (!pr.date) return '—';
  const days = Math.floor((Date.now() - new Date(pr.date).getTime()) / 86400000);
  if (days >= 30) return '<span class="badge badge-red">💀 ' + days + 'd</span>';
  if (days >= 14) return '<span class="badge badge-red">🔴 ' + days + 'd</span>';
  if (days >= 7) return '<span class="badge badge-yellow">⚠️ ' + days + 'd</span>';
  return days + 'd';
}

function reviewerVoteIcon(vote) {
  if (vote >= 10) return '✅';
  if (vote >= 5) return '👍';
  if (vote <= -10) return '❌';
  if (vote <= -5) return '⏳';
  return '👀';
}

function getReviewerBadge(reviewers) {
  if (!reviewers || reviewers.length === 0) return '—';
  const required = reviewers.filter(r => r.isRequired).length;
  const allApproved = reviewers.every(r => r.vote >= 5);
  const anyRejected = reviewers.some(r => r.vote <= -10);
  const cls = anyRejected ? 'badge-red' : allApproved ? 'badge-green' : 'badge-yellow';
  const reqText = required > 0 ? ` (${required} required)` : '';
  return `<span class="badge ${cls}">👥 ${reviewers.length}${reqText}</span>`;
}

function getReviewerPopup(reviewers) {
  if (!reviewers || reviewers.length === 0) return '';
  const rows = reviewers.map(r => {
    const icon = reviewerVoteIcon(r.vote);
    const reqLabel = r.isRequired
      ? '<span class="policy-blocking">required</span>'
      : '<span class="policy-optional">optional</span>';
    return `<div class="reviewer-row"><span class="reviewer-icon">${icon}</span><span class="reviewer-name">${escapeHtml(r.displayName)}</span>${reqLabel}</div>`;
  }).join('');
  return `<div class="reviewer-popup"><h4>Reviewers</h4>${rows}</div>`;
}

function getReviewerCell(reviewers) {
  const badge = getReviewerBadge(reviewers);
  const popup = getReviewerPopup(reviewers);
  return `<div class="reviewer-popup-wrap">${badge}${popup}</div>`;
}

function getPipelineBadge(ps) {
  if (!ps) return '—';
  if (ps.failed > 0) return `<span class="badge badge-red">🔴 ${ps.failed}/${ps.total} failed</span>`;
  if (ps.inProgress > 0) return `<span class="badge badge-yellow">🟡 ${ps.inProgress}/${ps.total} running</span>`;
  if (ps.succeeded === ps.total) return `<span class="badge badge-green">🟢 ${ps.total}/${ps.total} passed</span>`;
  return `${ps.total} pipeline(s)`;
}

function policyStatusIcon(status) {
  switch(status) {
    case 'approved': return '✅';
    case 'rejected': return '❌';
    case 'running': return '🔄';
    case 'queued': return '⏳';
    case 'broken': return '💥';
    default: return '❔';
  }
}

function getPolicyBadge(ps) {
  if (!ps) return '—';
  if (ps.rejected > 0) return `<span class="badge badge-red">🔴 ${ps.rejected}/${ps.total} rejected</span>`;
  if (ps.running > 0) return `<span class="badge badge-yellow">🟡 ${ps.running}/${ps.total} running</span>`;
  if (ps.approved === ps.total) return `<span class="badge badge-green">🟢 ${ps.total}/${ps.total} approved</span>`;
  return `${ps.total} policy(ies)`;
}

function getPolicyPopup(ps) {
  if (!ps || !ps.evaluations || ps.evaluations.length === 0) return '';
  const rows = ps.evaluations.map(e => {
    const icon = policyStatusIcon(e.status);
    const blockLabel = e.isBlocking
      ? '<span class="policy-blocking">required</span>'
      : '<span class="policy-optional">optional</span>';
    const nameHtml = e.buildUrl
      ? `<a href="${escapeHtml(e.buildUrl)}" target="_blank" class="policy-name">${escapeHtml(e.displayName)}</a>`
      : `<span class="policy-name">${escapeHtml(e.displayName)}</span>`;
    return `<div class="policy-row"><span class="policy-icon">${icon}</span>${nameHtml}${blockLabel}</div>`;
  }).join('');
  return `<div class="policy-popup"><h4>Policy Evaluations</h4>${rows}</div>`;
}

function getPolicyCell(policyStatus, pipelineStatus) {
  if (policyStatus) {
    const badge = getPolicyBadge(policyStatus);
    const popup = getPolicyPopup(policyStatus);
    return `<div class="policy-popup-wrap">${badge}${popup}</div>`;
  }
  return getPipelineBadge(pipelineStatus);
}

function renderMetrics() {
  const agg = DATA.aggregate;
  if (!agg.metrics) return;
  const el = document.getElementById('metrics-section');
  el.style.display = 'block';
  const m = agg.metrics;
  const cards = [
    { label: 'Median PR Age', value: m.medianAgeInDays.toFixed(1) + ' days' },
    { label: 'Avg First Review', value: m.avgTimeToFirstReviewInDays !== null ? m.avgTimeToFirstReviewInDays.toFixed(1) + ' days' : 'N/A' },
    { label: 'Avg Review Rounds', value: m.avgReviewRounds.toFixed(1) },
    { label: 'No Review Activity', value: m.prsWithNoReviewActivity },
  ];
  document.getElementById('metrics-cards').innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${c.label}</div><div class="value">${c.value}</div></div>`
  ).join('');
}

function exportCsv() {
  const rows = [['ID','Title','Author','Status','Repo','Size','Reviewers','Policies','Age (days)']];
  for (const pr of allPrs) {
    const days = pr.date ? Math.floor((Date.now() - new Date(pr.date).getTime()) / 86400000) : '';
    let policyCol = '';
    if (pr.policyStatus) {
      policyCol = `${pr.policyStatus.approved}/${pr.policyStatus.total} approved`;
    } else if (pr.pipelineStatus) {
      policyCol = `${pr.pipelineStatus.succeeded}/${pr.pipelineStatus.total} passed`;
    }
    const reviewerCol = (pr.reviewers || []).map(r => `${r.displayName} (${r.isRequired ? 'required' : 'optional'})`).join('; ');
    rows.push([pr.id, `"${pr.title.replace(/"/g,'""')}"`, (pr.isStarred ? '⭐ ' : '') + pr.author, pr.status, pr.repo, pr.size?.label || '', `"${reviewerCol}"`, policyCol, days]);
  }
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pr-review-report.csv';
  a.click();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Policy & reviewer popup: show on hover/click, keep visible while mouse is over badge or popup
(function() {
  let hideTimer = null;
  function showPopup(wrap) {
    const popup = wrap.querySelector('.policy-popup') || wrap.querySelector('.reviewer-popup');
    if (!popup) return;
    // Close any other open popups
    document.querySelectorAll('.policy-popup.visible, .reviewer-popup.visible').forEach(p => { if (p !== popup) p.classList.remove('visible'); });
    clearTimeout(hideTimer);
    popup.classList.add('visible');
  }
  function scheduleHide(wrap) {
    hideTimer = setTimeout(() => {
      const popup = wrap.querySelector('.policy-popup') || wrap.querySelector('.reviewer-popup');
      if (popup) popup.classList.remove('visible');
    }, 300);
  }
  function cancelHide() { clearTimeout(hideTimer); }

  document.addEventListener('mouseenter', e => {
    const wrap = e.target.closest('.policy-popup-wrap') || e.target.closest('.reviewer-popup-wrap');
    if (wrap) showPopup(wrap);
    if (e.target.closest('.policy-popup') || e.target.closest('.reviewer-popup')) cancelHide();
  }, true);
  document.addEventListener('mouseleave', e => {
    const wrap = e.target.closest('.policy-popup-wrap') || e.target.closest('.reviewer-popup-wrap');
    if (wrap) scheduleHide(wrap);
    if (e.target.closest('.policy-popup') || e.target.closest('.reviewer-popup')) {
      const parentWrap = e.target.closest('.policy-popup-wrap') || e.target.closest('.reviewer-popup-wrap');
      if (parentWrap) scheduleHide(parentWrap);
    }
  }, true);
  // Close on click outside
  document.addEventListener('click', e => {
    if (!e.target.closest('.policy-popup-wrap') && !e.target.closest('.reviewer-popup-wrap')) {
      document.querySelectorAll('.policy-popup.visible, .reviewer-popup.visible').forEach(p => p.classList.remove('visible'));
    }
  });
})();

init();
